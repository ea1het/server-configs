global
    # Send HAProxy logs to container stdout for containerization.
    log stdout format raw local0
    # Maximum concurrent connections accepted by HAProxy.
    maxconn 5000
    # Admin socket used for runtime inspection/control.
    stats socket /var/run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    # Inherit logging from global section.
    log global
    # Operate as HTTP reverse proxy.
    mode http
    # Use HTTP-specific access logs.
    option httplog
    # Do not log empty/null connections.
    option dontlognull
    # Add X-Forwarded-For with the real client IP.
    option forwardfor
    # Maximum time to establish a connection to a backend.
    timeout connect 5s
    # Default short timeout for normal API clients.
    timeout client 30s
    # Default short timeout for normal API responses.
    timeout server 30s
    # Default tunnel timeout; long-lived streams override this later.
    timeout tunnel 30s
    # Retry only connection failures, not application HTTP responses.
    retries 2

# -------------------------------------------------
# Docker internal DNS resolver
# -------------------------------------------------
resolvers docker
    # Docker embedded DNS resolver for service names like bff and hamalert.
    nameserver dns 127.0.0.11:53
    # Retry DNS resolution a few times before failing.
    resolve_retries 3
    # DNS lookup timeout.
    timeout resolve 1s
    # Delay between DNS retries.
    timeout retry 1s
    # Cache valid DNS answers briefly so scaled containers are rediscovered.
    hold valid 10s

# -------------------------------------------------
# HTTP -> HTTPS redirect
# -------------------------------------------------
frontend http_in
    # Listen on plain HTTP.
    bind *:80
    # Redirect all HTTP traffic to HTTPS.
    http-request redirect scheme https code 301

# -------------------------------------------------
# Main HTTPS frontend
# -------------------------------------------------
frontend https_in
    # Listen on HTTPS with TLS certificate and HTTP/2 + HTTP/1.1 support.
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/outdoordx.net.pem alpn h2,http/1.1
    # -------------------------
    # Basic connection flood protection
    # -------------------------
    # Per-IP temporary table tracking connection and request rates.
    stick-table type ip size 100k expire 30s store conn_rate(10s),http_req_rate(10s),conn_cur
    # Track each source IP in slot sc0.
    tcp-request connection track-sc0 src
    # Block clients making more than 100 HTTP requests per 10 seconds.
    http-request deny status 429 if { sc_http_req_rate(0) gt 100 }
    # Block clients opening more than 50 new connections per 10 seconds.
    http-request deny status 429 if { sc_conn_rate(0) gt 50 }
    # Block clients with more than 20 concurrent active connections.
    http-request deny status 429 if { sc_conn_cur(0) gt 20 }

    # -------------------------
    # CORS
    # -------------------------
    # Only allow browser requests from your frontend origin.
    acl allowed_origin req.hdr(Origin) -i https://outdoordx.com
    # Detect CORS preflight requests.
    acl is_options method OPTIONS
    # Save the allowed Origin in a transaction variable for response headers.
    http-request set-var(txn.origin) req.hdr(Origin) if allowed_origin
    # Immediately answer valid CORS preflight requests.
    http-request return status 204 if is_options allowed_origin
    # Return CORS headers only when the request origin was allowed.
    http-response set-header Access-Control-Allow-Origin %[var(txn.origin)] if { var(txn.origin) -m found }
    http-response set-header Access-Control-Allow-Credentials true if { var(txn.origin) -m found }
    http-response set-header Access-Control-Allow-Methods "GET, POST, OPTIONS" if { var(txn.origin) -m found }
    http-response set-header Access-Control-Allow-Headers "Content-Type, Authorization, Cache-Control, Last-Event-ID" if { var(txn.origin) -m found }
    http-response set-header Access-Control-Max-Age 86400 if { var(txn.origin) -m found }
    # Tell caches that responses may vary by Origin.
    http-response set-header Vary Origin

    # -------------------------
    # Security headers
    # -------------------------
    # Force browsers to use HTTPS for this domain.
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    # Prevent most iframe embedding.
    http-response set-header X-Frame-Options SAMEORIGIN
    # Prevent MIME sniffing.
    http-response set-header X-Content-Type-Options nosniff
    # Limit referrer leakage across origins.
    http-response set-header Referrer-Policy strict-origin-when-cross-origin

    # -------------------------
    # Host/path routing
    # -------------------------
    # Requests for the BFF host.
    acl host_bff hdr(host) -i bff.outdoordx.net
    # Requests for the HamAlert API host.
    acl host_hamalert hdr(host) -i api.outdoordx.net
    # Only allow GET/POST routing to HamAlert.
    acl method_get_post method GET POST
    # Detect long-lived SSE endpoints.
    # Replaceabke paths with real BFF SSE endpoint, if needed.
    acl is_sse path_beg /events /stream /sse
    # Route HamAlert traffic to the HamAlert backend.
    use_backend hamalert_backend if host_hamalert method_get_post
    # Route BFF SSE traffic to the long-timeout backend.
    use_backend bff_sse_backend if host_bff is_sse
    # Route normal BFF traffic to the short-timeout backend.
    use_backend bff_api_backend if host_bff
    # Fallback route.
    default_backend bff_api_backend

# -------------------------------------------------
# BFF normal API backend
# Short-lived HTTP requests
# -------------------------------------------------
backend bff_api_backend
    # Distribute normal API requests across BFF replicas.
    balance roundrobin
    # Healthcheck each BFF container using /health.
    option httpchk GET /health
    # Consider the backend healthy only if /health returns HTTP 200.
    http-check expect status 200
    # Fast backend connection timeout.
    timeout connect 5s
    # Normal API client must not stay idle longer than 30s.
    timeout client 30s
    # Normal API response must not stay idle longer than 30s.
    timeout server 30s
    # Do not let requests wait too long in HAProxy queue.
    timeout queue 5s
    # Dynamically discover up to 2 BFF containers via Docker DNS.
    # This matches: 
    #     docker compose up -d --scale bff=2
    # inter 5s = check every 5s
    # fall 3 = mark DOWN after 3 failures
    # rise 2 = mark UP after 2 successes
    # maxconn 1000 = per-BFF connection cap from HAProxy
    server-template bff 2 bff:9000 check resolvers docker init-addr libc,none inter 5s fall 3 rise 2 maxconn 1000

# -------------------------------------------------
# BFF SSE backend
# Long-lived streaming connections
# -------------------------------------------------
backend bff_sse_backend
    # Distribute SSE streams across BFF replicas.
    balance roundrobin
    # Healthcheck still uses the normal /health endpoint.
    option httpchk GET /health
    # Backend is valid only when /health returns HTTP 200.
    http-check expect status 200
    # Keep HTTP connections open for streaming.
    option http-keep-alive
    # Do not force-close HTTP connections; required for SSE streams.
    no option httpclose
    # Fast backend connection timeout.
    timeout connect 5s
    # SSE clients may remain connected/idle for up to 1 hour.
    timeout client 1h
    # SSE backend stream may remain open/idle for up to 1 hour.
    timeout server 1h
    # Long timeout for upgraded/tunnel-like traffic if ever used.
    timeout tunnel 1h
    # Do not let new SSE requests sit too long in HAProxy queue.
    timeout queue 5s
    # Dynamically discover the same 2 BFF containers, but with SSE-safe timeouts.
    server-template bff 2 bff:9000 check resolvers docker init-addr libc,none inter 5s fall 3 rise 2 maxconn 1000

# -------------------------------------------------
# HamAlert REST API backend
# -------------------------------------------------
backend hamalert_backend
    # Balance HamAlert requests; currently only 1 replica is expected.
    balance roundrobin
    # Healthcheck HamAlert through /health.
    option httpchk GET /health
    # HamAlert is healthy only when /health returns HTTP 200.
    http-check expect status 200
    # REST API should fail fast, not hang.
    timeout server 30s
    timeout client 30s
    # Dynamically discover 1 HamAlert container through Docker DNS.
    server-template hamalert 1 hamalert:9000 check resolvers docker init-addr libc,none inter 15s fall 3 rise 2 maxconn 2000

    
